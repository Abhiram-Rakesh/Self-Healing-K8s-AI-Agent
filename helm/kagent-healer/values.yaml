replicaCount: 1

image:
  repository: ""
  tag: "latest"
  pullPolicy: Always

nameOverride: ""
fullnameOverride: ""

imagePullSecrets: []

serviceAccount:
  create: true
  name: kagent-healer
  # Annotated at deploy time with the IRSA role ARN, e.g.:
  #   eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/kagent-healer-irsa
  annotations: {}

agent:
  # Safety controls
  dryRun: "true"
  confidenceThreshold: "0.75"
  maxReplicas: "10"
  dailyRequestLimit: "200"

  # Storage paths (overridden by persistence.enabled)
  memoryDbPath: "/tmp/kagent-memory.db"
  auditLogPath: "/tmp/kagent-audit.jsonl"

  logLevel: "INFO"

  # AWS Secrets Manager — loads SLACK_WEBHOOK_URL at startup
  secretsManagerRegion: "ap-south-1"
  slackWebhookSecret: "kagent/slack-webhook"

  # Webhook auth — inject via extraEnv referencing a K8s Secret in production
  webhookToken: ""
  # External base URL of this service, used to build /approve/<id> URLs in Slack messages.
  # Example: "http://kagent-healer.default.svc.cluster.local:8000"
  webhookBaseUrl: ""

  # kagent controller connection — bridge forwards alerts here via A2A protocol
  kagentControllerUrl: "http://kagent-controller.kagent.svc.cluster.local:8083"
  kagentNamespace: "kagent"
  kagentAgentName: "healer-agent"

persistence:
  enabled: false
  size: 1Gi
  storageClass: ""
  accessMode: ReadWriteOnce

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

service:
  type: ClusterIP
  webhookPort: 8000   # Alertmanager bridge — Alertmanager posts here
  mcpPort: 8080       # FastMCP SSE server — kagent calls write tools here

hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

rbac:
  create: true

# Optional environment overrides applied on top of agent.*
extraEnv: []

podDisruptionBudget:
  enabled: false
  minAvailable: 1

networkPolicy:
  enabled: false

nodeSelector: {}
tolerations: []
affinity: {}
