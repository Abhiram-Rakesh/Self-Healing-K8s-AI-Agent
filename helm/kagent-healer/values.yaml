replicaCount: 1

image:
  repository: ""
  tag: "latest"
  pullPolicy: Always

nameOverride: ""
fullnameOverride: ""

imagePullSecrets: []

serviceAccount:
  create: true
  name: kagent-healer
  # Annotated at deploy time with the IRSA role ARN, e.g.:
  #   eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/kagent-healer-irsa
  annotations: {}

agent:
  # Safety controls
  dryRun: "true"
  confidenceThreshold: "0.75"
  maxReplicas: "10"
  dailyRequestLimit: "200"

  # Storage paths (overridden by persistence.enabled)
  memoryDbPath: "/tmp/kagent-memory.db"
  auditLogPath: "/tmp/kagent-audit.jsonl"

  logLevel: "INFO"

  # AWS Secrets Manager — loads SLACK_WEBHOOK_URL at startup
  secretsManagerRegion: "ap-south-1"
  slackWebhookSecret: "kagent/slack-webhook"

  # Webhook auth — inject via extraEnv referencing a K8s Secret in production
  webhookToken: ""
  # External base URL of this service, used to build /approve/<id> URLs in Slack messages.
  # Example: "http://kagent-healer.default.svc.cluster.local:8000"
  webhookBaseUrl: ""

  # kagent agent connection — bridge forwards alerts directly to agent via A2A v0.3.0
  kagentAgentUrl: "http://healer-agent.kagent.svc.cluster.local:8080"
  kagentNamespace: "kagent"
  kagentAgentName: "healer-agent"

# PostgreSQL sub-chart (Bitnami). When enabled, incident memory is stored in
# PostgreSQL and DATABASE_URL is injected automatically. This unblocks HPA/KEDA.
# Run `helm dependency update helm/kagent-healer` before the first install.
postgresql:
  enabled: false
  auth:
    database: kagent_memory
    username: kagent
    password: ""          # set via --set or existingSecret; leave blank to auto-generate
  primary:
    persistence:
      size: 1Gi
      storageClass: ""

# SQLite PVC fallback — only used when postgresql.enabled=false.
# Does NOT support replicaCount > 1 (RWO, single-writer).
persistence:
  enabled: false
  size: 1Gi
  storageClass: ""
  accessMode: ReadWriteOnce

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

service:
  type: ClusterIP
  webhookPort: 8000   # Alertmanager bridge — Alertmanager posts here
  mcpPort: 8080       # FastMCP SSE server — kagent calls write tools here

hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

rbac:
  create: true

# Optional environment overrides applied on top of agent.*
extraEnv: []

podDisruptionBudget:
  enabled: false
  minAvailable: 1

networkPolicy:
  enabled: false

nodeSelector: {}
tolerations: []
affinity: {}
