# Production overrides. Apply with:
#   helm upgrade --install kagent-healer helm/kagent-healer/ -f values-prod.yaml ...
#
# Prerequisites:
#   1. helm dependency update helm/kagent-healer/
#   2. kubectl create secret generic kagent-pg-secret \
#        --from-literal=password=<strong-password>

replicaCount: 2

# PostgreSQL handles concurrent connections — multiple replicas are safe.
postgresql:
  enabled: true
  auth:
    database: kagent_memory
    username: kagent
    existingSecret: kagent-pg-secret
    secretKeys:
      userPasswordKey: password
  primary:
    persistence:
      size: 5Gi

# SQLite PVC disabled — PostgreSQL is the memory backend in production.
persistence:
  enabled: false

image:
  pullPolicy: IfNotPresent

agent:
  dryRun: "false"
  confidenceThreshold: "0.80"
  maxReplicas: "20"
  dailyRequestLimit: "500"
  logLevel: "INFO"

resources:
  requests:
    cpu: 200m
    memory: 384Mi
  limits:
    cpu: 1
    memory: 768Mi

hpa:
  enabled: true   # safe — PostgreSQL handles concurrent connections from multiple replicas
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: true

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: kagent-healer
          topologyKey: kubernetes.io/hostname
